name: Weekly Enriched Data Refresh

on:
  workflow_dispatch:         # manual trigger only — used when a forced full refresh is needed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    name: Run full pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: analytics/pyproject.toml

      - name: Install analytics dependencies
        run: |
          pip install \
            "yfinance>=0.2.40" \
            "pandas>=2.2.0" \
            "numpy>=1.26.0" \
            "requests>=2.31.0" \
            "requests-cache>=1.2.0" \
            "supabase>=2.4.0" \
            "python-dotenv>=1.0.0"

      - name: Run full refresh
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          OWNER_EMAIL:               ${{ secrets.OWNER_EMAIL }}
        run: python -m analytics.cron.daily_refresh --mode full
