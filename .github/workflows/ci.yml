name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: '11'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Check report ↔ Stock Detail section parity
        # Fails if the downloadable report (ReportDocument.tsx) and the live
        # Stock Detail page render different section sets. See the script header.
        run: pnpm check:report-sections

      - name: Build
        run: pnpm build

  e2e:
    name: Auth E2E (Playwright)
    runs-on: ubuntu-latest
    # Boots a real Next dev server, so it needs the (public) Supabase URL + anon
    # key. They live as repo Variables — until they're set this job SKIPS cleanly
    # instead of failing, so CI never goes red on missing config. Add repo
    # Variables NEXT_PUBLIC_SUPABASE_URL + NEXT_PUBLIC_SUPABASE_ANON_KEY to enable.
    # (Optional: repo Secrets E2E_EMAIL + E2E_PASSWORD unlock the logged-in tests.)
    if: ${{ vars.NEXT_PUBLIC_SUPABASE_URL != '' }}
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: '11'

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run auth E2E
        run: pnpm e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  backend:
    name: Python checks
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: analytics/pyproject.toml

      - name: Install Python dependencies
        run: |
          pip install \
            "yfinance>=0.2.40" \
            "pandas>=2.2.0" \
            "numpy>=1.26.0" \
            "requests>=2.31.0" \
            "requests-cache>=1.2.0" \
            "supabase>=2.4.0" \
            "python-dotenv>=1.0.0" \
            "ruff>=0.4.0" \
            "mypy>=1.10.0" \
            "pandas-stubs>=2.2.0" \
            "pytest>=8.2.0" \
            "types-requests>=2.31.0"

      - name: Ruff lint
        run: |
          python -m ruff check analytics/
          # web/_engine/ uses `_engine.` imports, so ruff needs to know the
          # package root is web/. Lint from there with explicit paths.
          (cd web && python -m ruff check _engine/ api/)

      - name: Mypy type check
        run: |
          python -m mypy analytics/ --ignore-missing-imports --explicit-package-bases
          (cd web && python -m mypy _engine/ api/ --ignore-missing-imports --explicit-package-bases)

      - name: Pytest
        run: python -m pytest analytics/ -v

      - name: Check _engine drift from analytics
        run: |
          # Every file in web/_engine/ must match analytics/<same path>, modulo
          # the `from analytics.` → `from _engine.` import rewrite. If you edit
          # one without the other, this step fails.
          set -e
          fail=0
          for f in major_cycle.py presets.py providers/base.py \
                   scoring/financial_health.py scoring/overall.py scoring/valuation.py; do
            if ! diff -u \
                <(sed 's|from analytics\.|from _engine.|g' "analytics/$f") \
                "web/_engine/$f"; then
              echo "DRIFT: web/_engine/$f differs from analytics/$f"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "The vendored cycle math in web/_engine/ is out of sync with"
            echo "the canonical files in analytics/. Update both in the same"
            echo "commit. See web/_engine/__init__.py for context."
            exit 1
          fi
