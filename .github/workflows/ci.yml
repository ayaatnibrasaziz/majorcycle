name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '11'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  backend:
    name: Python checks
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: analytics/pyproject.toml

      - name: Install Python dependencies
        run: |
          pip install \
            "yfinance>=0.2.40" \
            "pandas>=2.2.0" \
            "numpy>=1.26.0" \
            "requests>=2.31.0" \
            "requests-cache>=1.2.0" \
            "supabase>=2.4.0" \
            "python-dotenv>=1.0.0" \
            "ruff>=0.4.0" \
            "mypy>=1.10.0" \
            "pandas-stubs>=2.2.0" \
            "pytest>=8.2.0" \
            "types-requests>=2.31.0"

      - name: Ruff lint
        run: python -m ruff check analytics/

      - name: Mypy type check
        run: python -m mypy analytics/ --ignore-missing-imports --explicit-package-bases

      - name: Pytest
        run: python -m pytest analytics/ -v
