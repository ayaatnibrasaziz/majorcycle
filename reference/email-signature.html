<!DOCTYPE html>
<!--
  MajorCycle — branded email SIGNATURE for security@majorcycle.com replies.
  ===========================================================================
  This is NOT a Supabase template. It is the HTML signature the owner pastes
  into Gmail (Settings -> See all settings -> General -> Signature), assigned
  to the "Send mail as" identity security@majorcycle.com. Sending path is
  Gmail -> Resend SMTP (Cloudflare Email Routing receives; Resend sends).

  Brand: navy #1A3A6E / mid #1E5CB3 / bright #2E7DE8, Sora font (decisions
  #25/#26/#27). Uses signature-logo.png — a 108x108, ~10KB optimized copy of the
  navy square logo.png mark (the full 512px logo.png is ~384KB, too heavy for
  Gmail's image proxy to render reliably in a signature). NOT the transparent
  email-icon.png, which is built to float on the dark header and washes out on a
  white signature background.

  Gmail-safe: table layout + inline styles only (Gmail strips <style>/<head>),
  web-hosted image, no web-font dependency (Sora falls back to system sans in
  Gmail/Outlook — expected). Copy ONLY the block between the two PASTE markers.

  Preview: open this file in a browser. The <style> below is for local preview
  only and is intentionally OUTSIDE the paste block.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MajorCycle email signature</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap');
  body { background:#eef2f7; margin:0; padding:40px; font-family:'Sora',sans-serif; }
  .stage { background:#ffffff; max-width:600px; margin:0 auto; padding:28px 32px;
           border-radius:12px; box-shadow:0 4px 18px rgba(16,42,90,0.08); }
  .stage .replybody { color:#475569; font-size:14px; line-height:1.6; }
  .cut { max-width:600px; margin:22px auto 6px; font:12px/1.4 'Sora',sans-serif; color:#94a3b8; }
</style>
</head>
<body>

  <p class="cut">Preview — how a reply will look (your message text above, signature below):</p>
  <div class="stage">
    <p class="replybody">Hi there,<br /><br />Thanks for reaching out&hellip; [your reply text]<br /><br />Kind regards,</p>

    <!-- ================= PASTE INTO GMAIL SIGNATURE — START ================= -->
    <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse:collapse;width:440px;max-width:440px;">
      <tr>
        <td style="padding:0 0 14px 0;">
          <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="border-collapse:collapse;">
            <tr>
              <td style="vertical-align:middle;padding:0 16px 0 0;">
                <img src="https://www.majorcycle.com/signature-logo.png" width="54" height="54" alt="MajorCycle" style="display:block;width:54px;height:54px;border-radius:12px;" />
              </td>
              <td style="vertical-align:middle;border-left:2px solid #2E7DE8;padding:0 0 0 16px;">
                <div style="font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:17px;font-weight:700;color:#1A3A6E;line-height:1.15;letter-spacing:0.2px;">MajorCycle</div>
                <div style="font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;font-weight:600;color:#1E5CB3;line-height:1.4;padding-top:3px;">Security Team</div>
                <div style="font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;color:#475569;line-height:1.5;padding-top:7px;">
                  <a href="mailto:security@majorcycle.com" style="color:#1E5CB3;text-decoration:none;font-weight:600;">security@majorcycle.com</a>
                  <span style="color:#cbd5e1;">&nbsp;&bull;&nbsp;</span>
                  <a href="https://www.majorcycle.com" style="color:#1E5CB3;text-decoration:none;font-weight:600;">majorcycle.com</a>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
      <tr>
        <td style="border-top:1px solid #e2e8f0;padding:10px 0 0 0;">
          <div style="font-family:'Sora',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:11px;color:#94a3b8;line-height:1.5;">
            MajorCycle provides educational information only &mdash; not financial advice.
          </div>
        </td>
      </tr>
    </table>
    <!-- ================= PASTE INTO GMAIL SIGNATURE — END =================== -->

  </div>

</body>
</html>
